name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Cairo + Pango + Korean fonts for social plugin)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install \
            "mkdocs-material[imaging]" \
            mkdocs-blogging-plugin \
            mkdocs-rss-plugin \
            "pillow>=10.0" \
            "cairosvg>=2.7"

      - name: Deploy to gh-pages
        run: mkdocs gh-deploy --force --clean --verbose
