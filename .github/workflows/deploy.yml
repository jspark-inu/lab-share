name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
      # also build on next-migration so we can verify CI before cutover
      - next-migration
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued mid-flight runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Phase 5 backend integration is deferred — left empty intentionally
          NEXT_PUBLIC_API_BASE: ''

      - name: Verify CNAME present in out/
        run: |
          test -f out/CNAME || (echo "CNAME missing from out/" && exit 1)
          cat out/CNAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: out
          retention-days: 7

  deploy:
    # Only deploy from main; next-migration runs build for verification only
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: out
          path: out

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: lab.haiinu.com
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
