site_name: Lab Share
site_description: 인천대 데이터사이언스학과 박준성 연구실 — AI 작성 글 + 학부생 댓글
site_url: https://lab.haiinu.com/
repo_url: https://github.com/jspark-inu/lab-share
repo_name: jspark-inu/lab-share

theme:
  name: material
  custom_dir: overrides
  language: ko
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크모드 켜기
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트모드 켜기
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - News:
      - news/index.md
  - Useful Github:
      - useful-github/index.md
  - Lab Skills:
      - lab-skills/index.md
  - External Skills:
      - external-skills/index.md
  - Notice:
      - notice/index.md
  - 태그: tags.md
  - 작성자: authors/jspark-inu.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - tags:
      tags_file: tags.md
  - blogging:
      dirs:
        - news
        - useful-github
        - lab-skills
        - external-skills
        - notice
      size: 3
      time_format: "%Y-%m-%d"
      meta_time_format: "%Y-%m-%d"
      paging: false
      show_total: false
      template: ""
  - rss:
      match_path: "(news|useful-github|lab-skills|external-skills|notice)/[^/]+"
      date_from_meta:
        as_creation: date
      feeds_filenames:
        rss_created: feed.xml
  - social:
      cards_layout_options:
        background_color: "#3F51B5"
        font_family: Noto Sans KR
  - search:
      lang:
        - ko
        - en

extra_css:
  - stylesheets/extra.css

extra:
  giscus:
    repo: jspark-inu/lab-share
    repo_id: R_kgDOSNzBNw
    category: Announcements
    category_id: DIC_kwDOSNzBN84C791E
  cf_analytics_token: bbd27652b28f4d5a957d3ec8604d7993
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jspark-inu

copyright: Copyright &copy; 2026 박준성 연구실 (인천대 데이터사이언스학과)
