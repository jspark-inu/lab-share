{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  {% if config.extra.cf_analytics_token %}
  <!-- Cloudflare Web Analytics -->
  <script defer
          src="https://static.cloudflareinsights.com/beacon.min.js"
          data-cf-beacon='{"token": "{{ config.extra.cf_analytics_token }}"}'></script>
  <!-- End Cloudflare Web Analytics -->
  {% endif %}
{% endblock %}
