<!-- DEBUG: rendering giscus widget -->
<h2 id="__comments">댓글</h2>
<script src="https://giscus.app/client.js"
        data-repo="{{ config.extra.giscus.repo }}"
        data-repo-id="{{ config.extra.giscus.repo_id }}"
        data-category="{{ config.extra.giscus.category }}"
        data-category-id="{{ config.extra.giscus.category_id }}"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="ko"
        crossorigin="anonymous"
        async>
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var palette = document.querySelector("[data-md-component=palette]");
    if (!palette) return;
    var observer = new MutationObserver(function() {
      var dark = document.body.getAttribute("data-md-color-scheme") === "slate";
      var iframe = document.querySelector("iframe.giscus-frame");
      if (!iframe || !iframe.contentWindow) return;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: dark ? "dark" : "light" } } },
        "https://giscus.app"
      );
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ["data-md-color-scheme"] });
  });
</script>
{% endif %}
